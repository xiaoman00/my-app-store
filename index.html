<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>The Bird Who Knew</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      :root {
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.58);
        --stroke: rgba(255, 255, 255, 0.12);
        --card: rgba(255, 255, 255, 0.06);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Helvetica Neue", Arial, sans-serif;
        font-feature-settings: "ss01", "cv11";
        color: var(--text);
        background-color: #050507;
        background-image:
          radial-gradient(
            1200px 700px at 18% 12%,
            rgba(86, 96, 140, 0.22),
            transparent 60%
          ),
          radial-gradient(
            900px 600px at 82% 88%,
            rgba(140, 86, 120, 0.16),
            transparent 60%
          ),
          linear-gradient(180deg, #07080c 0%, #050507 100%);
        background-attachment: fixed;
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        letter-spacing: -0.011em;
      }

      @supports (font-variation-settings: normal) {
        body {
          font-family: "Inter var", -apple-system, BlinkMacSystemFont,
            "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        }
      }

      .card {
        position: relative;
        display: block;
        text-decoration: none;
        color: inherit;
        width: min(420px, 100%);
        padding: 44px 40px 36px;
        border-radius: 22px;
        background: var(--card);
        border: 1px solid var(--stroke);
        backdrop-filter: blur(28px) saturate(160%);
        -webkit-backdrop-filter: blur(28px) saturate(160%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          0 30px 60px -30px rgba(0, 0, 0, 0.6);
        transition:
          transform 600ms cubic-bezier(0.22, 1, 0.36, 1),
          box-shadow 600ms cubic-bezier(0.22, 1, 0.36, 1),
          border-color 600ms cubic-bezier(0.22, 1, 0.36, 1);
        will-change: transform;
      }

      .card::after {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 23px;
        pointer-events: none;
        background: radial-gradient(
          400px 200px at 50% 0%,
          rgba(255, 255, 255, 0.08),
          transparent 60%
        );
        opacity: 0;
        transition: opacity 600ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .card:hover,
      .card:focus-visible {
        transform: translateY(-2px) scale(1.015);
        border-color: rgba(255, 255, 255, 0.22);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 40px 80px -30px rgba(0, 0, 0, 0.7),
          0 0 0 1px rgba(255, 255, 255, 0.04),
          0 0 60px -10px rgba(180, 200, 255, 0.18);
        outline: none;
      }

      .card:hover::after,
      .card:focus-visible::after {
        opacity: 1;
      }

      .eyebrow {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 18px;
      }

      .title {
        margin: 0 0 10px;
        font-size: clamp(28px, 4.2vw, 34px);
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.1;
      }

      .desc {
        margin: 0 0 32px;
        font-size: 15px;
        line-height: 1.55;
        color: var(--muted);
        font-weight: 400;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
        opacity: 0.85;
        transition: opacity 300ms ease, gap 400ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .cta svg {
        width: 14px;
        height: 14px;
        transition: transform 400ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .card:hover .cta {
        opacity: 1;
        gap: 12px;
      }

      .card:hover .cta svg {
        transform: translateX(2px);
      }

      @media (prefers-reduced-motion: reduce) {
        .card,
        .card::after,
        .cta,
        .cta svg {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <a
      class="card"
      href="https://xiaoman00.github.io/website/"
      target="_blank"
      rel="noopener noreferrer"
    >
      <p class="eyebrow">Featured</p>
      <h1 class="title">The Bird Who Knew</h1>
      <p class="desc">A journey through poetry and time.</p>
      <span class="cta">
        Enter
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path
            d="M3 8h10M9 4l4 4-4 4"
            stroke="currentColor"
            stroke-width="1.4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
    </a>
  </body>
</html>
